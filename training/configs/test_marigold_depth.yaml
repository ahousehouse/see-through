optimizer_args:
  betas: [0.9, 0.999]
  weight_decay: 0.1
  eps: 1e-08


validation_steps: 2000
checkpointing_steps: 2000
visualization_steps: 500
train_batch_size: 4
val_batch_size: 1
mixed_precision: "bf16"

report_to: tensorboard
gradient_accumulation_steps: 4
learning_rate: 3e-5

model_type: marigold

pretrained_model: depth-anything/Depth-Anything-V2-Large


max_grad_norm: 1.


multi_res_noise:
  strength: 0.9
  annealed: true
  downscale_strategy: original

gt_depth_type: depth_raw_norm
gt_mask_type: valid_mask_raw


loss:
  name: mse_loss
  kwargs:
    reduction: mean

validation:
  denoising_steps: 1
  ensemble_size: 1
  processing_res: 0
  match_input_res: false
  resample_method: bilinear
  main_val_metric: abs_relative_difference
  main_val_metric_goal: minimize
  init_seed: 2024

eval:
  alignment: least_square
  align_max_res: null
  eval_metrics:
  - abs_relative_difference
  - squared_relative_difference
  - rmse_linear
  - rmse_log
  - log10
  - delta1_acc
  - delta2_acc
  - delta3_acc
  - i_rmse
  - silog_rmse