seed: 42

model_args:
  model_type: b_hq
  class_num: 24
  fix_img_en: false
  fix_prompt_en: true
  fix_mask_de: false

dataset_args:
  src_list:
    - sample_list: workspace/datasets/l2d_bodysamples_v3.txt
      sample_rate: 1
  class_num: 24
  target_size: 1024

optimizer_args:
  betas: [0.9, 0.999]
  weight_decay: 0.01
  eps: 1e-08

loss_type: samhq

lr_scheduler: constant_with_warmup
lr_warmup_steps: 100
train_batch_size: 1
mixed_precision: "bf16"
report_to: tensorboard
gradient_accumulation_steps: 1
learning_rate: 3e-5
max_train_steps: 100
validation_steps: 200
checkpointing_steps: 200
visualization_steps: 200


seed: 42

dataset_args:
  src_list:
    - workspace/datasets/l2d_bodysamples_v3.txt
  random_flip: 0.5
  random_crop: 0.3
  random_hsv: 0.25
  class_num: 23 # must be equal to len(tag_list), i forgot why it's not calculated automatically
  tag_list: [
    'front hair', 'back hair', 'headwear', 'face', 'irides', 'eyebrow', 'eyewhite', 'eyelash', 'eyewear', 'ears', 'earwear', 'nose', 'mouth', 
    'neck', 'neckwear', 'topwear', 'handwear', 'bottomwear', 'legwear', 'footwear', 
    'tail', 'wings', 'objects'
  ]

